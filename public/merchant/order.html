<!doctype html>
<html>
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Merchant Order Detail</title>
  <link rel="stylesheet" href="assets/shop.css">
  <style>.actions{display:flex;gap:8px;flex-wrap:wrap}.actions input{padding:8px;border:1px solid #d1d5db;border-radius:8px}.slip-image{max-width:100%;border:1px solid #e5e7eb;border-radius:12px}</style>
</head>
<body>
<div class="app"><div id="header"></div><div id="detail"></div></div>
<div id="toast" class="toast"></div>
<script src="assets/api.js"></script><script src="assets/app.js"></script>
<script>
renderHeader('Merchant Order Detail');
const detailEl=document.getElementById('detail');
const orderId=new URLSearchParams(location.search).get('id');
if(requireAuth()) loadDetail();

function friendlyError(e){if(e?.status===403) return 'ไม่มีสิทธิ์'; if(e?.status===409) return 'สถานะออเดอร์ไม่ถูกต้อง กรุณารีเฟรช'; return e?.message||'เกิดข้อผิดพลาด';}
function makeMuted(t){const d=document.createElement('div');d.className='muted';d.textContent=t;return d;}
function title(t){const d=document.createElement('h3');d.textContent=t;return d;}
function normalizeImageUrl(url){if(!url)return '';if(url.startsWith('http'))return url; if(url.startsWith('/')) return shopSettings.getBaseUrl().replace(/\/$/,'')+url;return shopSettings.getBaseUrl().replace(/\/$/,'')+'/storage/'+url.replace(/^\/+/, '');}

async function loadDetail(){
  detailEl.innerHTML='<div class="loading">Loading...</div>';
  try{
    const d=await api.get(`/api/merchant/orders/${orderId}`);
    const card=document.createElement('div');card.className='card';
    card.append(title(d.order.order_no||`#${d.order.id}`));
    card.append(makeMuted(`Status: ${d.order.status}`));
    card.append(makeMuted(`Total: ${formatMoney(d.order.total)}`));

    card.append(title('Shipment'));
    card.append(makeMuted(`Provider: ${d.shipment?.provider||'-'}`));
    card.append(makeMuted(`Tracking: ${d.shipment?.tracking_no||'-'}`));

    const action=document.createElement('div');action.className='actions';
    const provider=document.createElement('input');provider.placeholder='Provider';provider.value=d.shipment?.provider||'';
    const tracking=document.createElement('input');tracking.placeholder='Tracking No';tracking.value=d.shipment?.tracking_no||'';
    const fee=document.createElement('input');fee.type='number';fee.step='0.01';fee.placeholder='Fee';fee.value=d.shipment?.fee||'';
    const saveBtn=document.createElement('button');saveBtn.className='btn';saveBtn.textContent='Set Tracking';
    saveBtn.onclick=async()=>{try{await api.patch(`/api/merchant/orders/${orderId}/shipment`,{provider:provider.value.trim(),tracking_no:tracking.value.trim(),fee:fee.value?Number(fee.value):0});showToast('บันทึก Tracking สำเร็จ','success');loadDetail();}catch(e){showToast(friendlyError(e),'error');}};
    const shippedBtn=document.createElement('button');shippedBtn.className='btn';shippedBtn.textContent='Mark Shipped';
    shippedBtn.onclick=async()=>{try{await api.patch(`/api/merchant/orders/${orderId}/mark-shipped`,{});showToast('อัปเดตเป็น SHIPPED สำเร็จ','success');loadDetail();}catch(e){showToast(friendlyError(e),'error');}};
    const cancelBtn=document.createElement('button');cancelBtn.className='btn';cancelBtn.textContent='Cancel Order';
    cancelBtn.onclick=async()=>{try{await api.patch(`/api/merchant/orders/${orderId}/cancel`,{});showToast('ยกเลิกออเดอร์สำเร็จ','success');loadDetail();}catch(e){showToast(friendlyError(e),'error');}};
    action.append(provider,tracking,fee,saveBtn,shippedBtn,cancelBtn);card.append(action);

    card.append(title('Items')); (d.items||[]).forEach(it=>card.append(makeMuted(`${it.product_name||it.sku} x ${it.qty} = ${formatMoney(it.line_total)}`)));
    card.append(title('Payment Slip'));
    if(d.payment_slip){card.append(makeMuted(`สถานะ: ${d.payment_slip.status||'-'}`));const img=normalizeImageUrl(d.payment_slip.image_url);if(img){const a=document.createElement('a');a.href=img;a.target='_blank';const i=document.createElement('img');i.className='slip-image';i.src=img;a.append(i);card.append(a)}}

    detailEl.innerHTML='';detailEl.append(card);
  }catch(e){detailEl.innerHTML=`<div class='error'>${friendlyError(e)}</div>`;}
}
</script>
</body>
</html>
