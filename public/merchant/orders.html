<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Merchant Orders v1</title>
  <link rel="stylesheet" href="assets/shop.css">
  <style>.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}.toolbar input,.toolbar select{padding:8px;border:1px solid #d1d5db;border-radius:8px}.toolbar input{flex:1;min-width:180px}.card-link{text-decoration:none;color:inherit;display:block}</style>
</head>
<body>
<div class="app">
  <div id="header"></div>
  <div class="toolbar">
    <select id="statusFilter">
      <option value="">ทุกสถานะ</option>
      <option value="WAITING_PAYMENT">WAITING_PAYMENT</option>
      <option value="PAYMENT_REVIEW">PAYMENT_REVIEW</option>
      <option value="PAYMENT_REJECTED">PAYMENT_REJECTED</option>
      <option value="PAID">PAID</option>
      <option value="SHIPPING_CREATED">SHIPPING_CREATED</option>
      <option value="SHIPPED">SHIPPED</option>
      <option value="CANCELLED">CANCELLED</option>
    </select>
    <input id="qFilter" type="text" placeholder="ค้นหาเลขออเดอร์/tracking">
    <button id="searchBtn" class="btn">ค้นหา</button>
  </div>
  <div id="list"></div>
</div>
<div id="toast" class="toast"></div>
<script src="assets/api.js"></script>
<script src="assets/app.js"></script>
<script>
renderHeader('Merchant Orders v1');
const listEl=document.getElementById('list');
const statusEl=document.getElementById('statusFilter');
const qEl=document.getElementById('qFilter');
if(requireAuth()) loadOrders();
document.getElementById('searchBtn').addEventListener('click',loadOrders);

async function loadOrders(){
  listEl.innerHTML='<div class="loading">Loading...</div>';
  try{
    const data=await api.get('/api/merchant/orders',{status:statusEl.value||undefined,q:qEl.value.trim()||undefined});
    const items=data.items||[];
    if(!items.length){listEl.innerHTML="<div class='card'>ไม่มีออเดอร์</div>";return;}
    listEl.innerHTML='';
    items.forEach((item)=>{
      const card=document.createElement('div');card.className='card';
      const link=document.createElement('a');link.className='card-link';link.href=`/merchant/order.html?id=${item.id}`;
      const top=document.createElement('div');top.className='row between';
      const code=document.createElement('b');code.textContent=item.order_no||`#${item.id}`;
      const status=document.createElement('span');status.textContent=item.status||'-';
      top.append(code,status);link.append(top);
      link.append(createTextRow('ยอดรวม', formatMoney(item.total)));
      link.append(createTextRow('Slip', item.payment_slip_status||'-'));
      link.append(createTextRow('Tracking', item.shipment_tracking_no||'-'));
      card.append(link);listEl.append(card);
    });
  }catch(e){listEl.innerHTML=`<div class='error'>${e.message}</div>`;}
}
function createTextRow(label,value){const row=document.createElement('div');row.className='muted';row.textContent=`${label}: ${value}`;return row;}
</script>
</body>
</html>
