<!doctype html>
<html>
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Admin Orders</title>
  <link rel="stylesheet" href="assets/shop.css">
  <style>.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}.toolbar input,.toolbar select{padding:8px;border:1px solid #d1d5db;border-radius:8px}.toolbar input{flex:1;min-width:180px}.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}.actions input{padding:6px;border:1px solid #d1d5db;border-radius:8px}</style>
</head>
<body>
<div class="app"><div id="header"></div>
  <div class="toolbar">
    <select id="statusFilter">
      <option value="">ทุกสถานะ</option>
      <option value="WAITING_PAYMENT">WAITING_PAYMENT</option><option value="PAYMENT_REVIEW">PAYMENT_REVIEW</option><option value="PAYMENT_REJECTED">PAYMENT_REJECTED</option>
      <option value="PAID">PAID</option><option value="SHIPPING_CREATED">SHIPPING_CREATED</option><option value="SHIPPED">SHIPPED</option><option value="CANCELLED">CANCELLED</option>
    </select>
    <input id="qFilter" placeholder="ค้นหาเลขออเดอร์/ลูกค้า/tracking"><button id="searchBtn" class="btn">ค้นหา</button>
  </div>
  <div id="list"></div>
</div>
<div id="toast" class="toast"></div>
<script src="assets/api.js"></script><script src="assets/app.js"></script>
<script>
renderHeader('Admin Orders v1');
const listEl=document.getElementById('list');
if(requireAuth()) load();
document.getElementById('searchBtn').addEventListener('click',load);
const errMsg=(e)=>e?.status===403?'ไม่มีสิทธิ์':e?.status===409?'สถานะออเดอร์ไม่ถูกต้อง กรุณารีเฟรช':(e?.message||'เกิดข้อผิดพลาด');

async function load(){
  listEl.innerHTML='<div class="loading">Loading...</div>';
  try{
    const d=await api.get('/api/admin/orders',{status:document.getElementById('statusFilter').value||undefined,q:document.getElementById('qFilter').value.trim()||undefined});
    const items=d.items||[]; listEl.innerHTML=''; if(!items.length){listEl.innerHTML="<div class='card'>ไม่มีออเดอร์</div>";return;}
    items.forEach((it)=>{
      const card=document.createElement('div');card.className='card';
      card.innerHTML=`<div class='row between'><b>${it.order_no||'#'+it.id}</b><span>${it.status||'-'}</span></div>
      <div class='muted'>ลูกค้า: ${it.customer_name||'-'} (${it.customer_phone||'-'})</div>
      <div class='muted'>ร้าน: ${it.merchant_shop_name||'-'} | ยอดรวม: ${formatMoney(it.total)}</div>
      <div class='muted'>Slip: ${it.payment_slip_status||'-'} | Tracking: ${it.shipment_tracking_no||'-'}</div>`;
      const actions=document.createElement('div');actions.className='actions';
      const provider=document.createElement('input');provider.placeholder='Provider';
      const tracking=document.createElement('input');tracking.placeholder='Tracking No';
      const fee=document.createElement('input');fee.placeholder='Fee';fee.type='number';fee.step='0.01';
      const setTrack=document.createElement('button');setTrack.className='btn';setTrack.textContent='Set Tracking';
      setTrack.onclick=async()=>{try{await api.patch(`/api/admin/orders/${it.id}/shipment`,{provider:provider.value.trim(),tracking_no:tracking.value.trim(),fee:fee.value?Number(fee.value):0});showToast('บันทึก tracking สำเร็จ','success');load();}catch(e){showToast(errMsg(e),'error')}};
      const ship=document.createElement('button');ship.className='btn';ship.textContent='Mark Shipped';
      ship.onclick=async()=>{try{await api.patch(`/api/admin/orders/${it.id}/mark-shipped`,{});showToast('อัปเดต SHIPPED สำเร็จ','success');load();}catch(e){showToast(errMsg(e),'error')}};
      actions.append(provider,tracking,fee,setTrack,ship);card.append(actions); listEl.append(card);
    });
  }catch(e){listEl.innerHTML=`<div class='error'>${errMsg(e)}</div>`}
}
</script>
</body>
</html>
